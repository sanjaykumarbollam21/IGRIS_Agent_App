name: igris_mobile
description: IGRIS Mobile Application - Intelligent General-purpose Robotic Intelligence System
publish_to: 'none'
version: 4.0.0+5

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # State management
  flutter_riverpod: ^2.4.0
  # HTTP requests
  dio: ^5.4.0
  # Local storage
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^10.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # Biometric authentication
  local_auth: ^3.0.1
  # Speech to text
  speech_to_text: ^7.3.0
  # Text to speech
  flutter_tts: ^4.0.0
  # Background services
  workmanager: ^0.9.0+3
  # Push notifications
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  # Connectivity
  connectivity_plus: ^7.1.1
  # WiFi information
  network_info_plus: ^6.1.1
  # Permission handling
  permission_handler: ^12.0.1
  # SVG support
  flutter_svg: ^2.0.0
  # Charts
  fl_chart: ^1.2.0
  # DateTime handling
  intl: ^0.20.2
  table_calendar: ^3.1.0
  # Loading animations
  flutter_spinkit: ^5.2.0
  # Cached network images
  cached_network_image: ^3.3.0
  # Shimmer effect
  shimmer: ^3.0.0
  # Lottie animations
  lottie: ^3.3.3
  # URL launcher
  url_launcher: ^6.2.0
  # Google Gemini AI
  google_generative_ai: ^0.4.6
  # Package info
  package_info_plus: ^9.0.1
  # Device info
  device_info_plus: ^12.4.0
  # Screen utilities
  flutter_screenutil: ^5.9.0
  # Dropdown search
  dropdown_search: ^7.0.0
  # Form validation
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.3.0
  # AI Features — Image & Media
  image_picker: ^1.1.0
  file_picker: ^8.1.2
  # Markdown rendering for AI responses
  flutter_markdown: ^0.7.3
  # File system paths
  path_provider: ^2.1.3
  # Share generated content
  share_plus: ^10.1.2
  # Save images to device gallery
  gal: ^2.3.0
  # Location for Maps features
  geolocator: ^13.0.2
  # Notification Listener (Free alternative to Twilio for WhatsApp/SMS replies)
  flutter_notification_listener: ^1.4.0
  # SMS support — replaces discontinued telephony package (which crashed on permission callbacks)
  flutter_sms: ^3.0.1
  # HTTP for direct API calls
  http: ^1.2.2
  # ─── "Hey IGRIS" wake word (fully on-device, NO API key, NO cloud) ───
  # sherpa-onnx — Apache 2.0, supports Android + iOS + macOS, actively
  # maintained. Provides keyword spotting (KWS) with a built-in
  # Zipformer-based English model (~15 MB mobile variant).
  # Docs:  https://k2-fsa.github.io/sherpa/onnx/kws.html
  # Model: sherpa-onnx-kws-zipformer-gigaspeech-3.3M-2024-01-01-mobile
  sherpa_onnx: ^1.13.2
  # `record` gives us a 16 kHz mono PCM stream we can feed into sherpa-onnx.
  # License: MIT. See: https://pub.dev/packages/record
  record: ^5.1.2
  porcupine_flutter: ^4.0.0
  # Used by the Android FGS wrapper.
  flutter_foreground_task: ^9.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.0
  json_serializable: ^6.7.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/lottie/
    - assets/fonts/
    - assets/kws/
    # "Hey IGRIS" wake word TFLite model. Generated by
    # tools/train_wake_word.py. If you haven't generated one yet, the app
    # falls back to a friendly "model missing" error — see
    # assets/wake_word/README.md.
    - assets/wake_word/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/igris_icon.jpg"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/igris_icon.jpg"
  min_sdk_android: 21

flutter_native_splash:
  color: "#ffffff"
  image: assets/icons/app_icon.png
  android: true
  ios: true

dependency_overrides:
  record_platform_interface: 1.1.0